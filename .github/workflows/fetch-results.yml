name: Fetch Football Results

on:
  schedule:
    - cron: '*/15 * * * *'    # svakih 5 minuta
  workflow_dispatch:           # omogućuje ručno pokretanje

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update results
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, datetime, os, sys
          import zoneinfo

          FD_KEY = os.environ.get('FD_API_KEY', '')
          if not FD_KEY:
              print("ERROR: FD_API_KEY secret nije postavljen!")
              sys.exit(1)

          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          to_check = [m for m in data['matches'] if m.get('fdid') and m.get('rh') is None]
          print(f"Utakmice za provjeru: {len(to_check)}")

          updated = 0
          for m in to_check:
              try:
                  url = f"https://api.football-data.org/v4/matches/{m['fdid']}"
                  req = urllib.request.Request(url, headers={"X-Auth-Token": FD_KEY})
                  with urllib.request.urlopen(req) as r:
                      fd = json.loads(r.read())

                  status = fd.get("status")
                  print(f"  [{m['h']} vs {m['a']}] fdid={m['fdid']} → {status}")

                  if status == "FINISHED":
                      score = fd["score"]["fullTime"]
                      m["rh"] = score["home"]
                      m["ra"] = score["away"]
                      print(f"    Rezultat: {m['rh']}:{m['ra']}")
                      updated += 1
              except Exception as e:
                  print(f"  Greška za fdid {m.get('fdid')}: {e}")

          if not data.get("settings"):
              data["settings"] = {}
          hr_tz = zoneinfo.ZoneInfo("Europe/Zagreb")
          now_hr = datetime.datetime.now(hr_tz)
          data["settings"]["lastChecked"] = now_hr.strftime("%Y-%m-%dT%H:%M:%S.000") + now_hr.strftime("%z")[:3] + ":" + now_hr.strftime("%z")[3:]

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"Gotovo. Ažurirano: {updated} rezultat(a).")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Nema promjena." || (git commit -m "Auto-fetch: ažurirani rezultati utakmica" && git push)
